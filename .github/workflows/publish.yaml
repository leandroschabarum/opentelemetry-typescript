name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  id-token: write

jobs:
  build-and-publish:
    name: Publish version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Extract version
        id: extract
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          VERSION_EXTRAS=$([[ "$VERSION" == *-* ]] && echo ${VERSION#*-})
          VERSION_TAG=${VERSION_EXTRAS%%.*}
          VERSION_REVISION=${VERSION_EXTRAS#*.}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_tag=$VERSION_TAG" >> $GITHUB_OUTPUT
          echo "version_revision=$VERSION_REVISION" >> $GITHUB_OUTPUT

      - name: Update package version
        env:
          VERSION: ${{ steps.extract.outputs.version }}
        run: npm version $VERSION --no-git-tag-version

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Publish release
        env:
          DIST_TAG: ${{ steps.extract.outputs.version_tag || 'latest' }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --tag $DIST_TAG --access public --provenance
